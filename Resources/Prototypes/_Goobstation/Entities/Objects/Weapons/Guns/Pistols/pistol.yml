- type: entity
  name: Dualetta
  parent: [ BaseWeaponPistol, BaseSyndicateContraband ]
  id: WeaponPistolDualetta
  description: The coolest pistol in the sector. It is said that nobody is strong enough of will to tarnish this weapon's reputation by daring to fire it without another paired pistol. Though, some people have mustered the will to simply use a different gun in the other hand.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Pistols/dualetta.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/Pistols/dualetta.rsi
  - type: Gun
    minAngle: 1
    maxAngle: 5
    angleIncrease: 1
    angleDecay: 4
    fireRate: 8
    availableModes:
    - SemiAuto
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mateba.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine9x19mmPistolHighCapacityFMJ # HardLight: MagazinePistolHighCapacity<Magazine9x19mmPistolHighCapacityFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine9x19mmPistolFMJ # HardLight: MagazinePistol<Magazine9x19mmPistolFMJ
          - Magazine9x19mmPistolHighCapacityFMJ # HardLight: MagazinePistolHighCapacity<Magazine9x19mmPistolHighCapacityFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge9x19mmFMJ # HardLight: CartridgePistol<Cartridge9x19mmFMJ
        priority: 1
        whitelist:
          tags:
          - Cartridge9x19mmFMJ # HardLight: CartridgePistol<Cartridge9x19mmFMJ
  - type: Tag
    tags:
    - WeaponPistolDualetta
  - type: Multishot
    missChance: 0
    spreadMultiplier: 1
    spreadAddition: 0
  - type: RequiresDualWield
    whitelist:
      tags:
      - WeaponPistolDualetta

- type: entity
  parent: [ NFBaseWeaponRevolverChamber45, BaseItem, BaseC3PirateContraband ]
  id: WeaponPistolAnaconda
  name: Anaconda
  description: A heavy pistol.
  components:
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
  - type: Tag
    tags:
    - Sidearm
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Pistols/anaconda.rsi
    layers:
    - state: icon
      map: [ "enum.GunVisualLayers.Base" ]
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/Pistols/anaconda.rsi
    quickEquip: false
    slots:
    - suitStorage
    - Belt
  - type: Gun
    fireRate: 3
    projectileSpeed: 40 # Mono
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/hpistol.ogg
  - type: ContainerContainer
    containers:
      revolver-ammo: !type:Container
  - type: RevolverAmmoProvider
    whitelist:
      tags:
        - Cartridge45_magnumFMJ
        - SpeedLoader45_magnumFMJ
    proto: Cartridge45_ACPFMJ
  - type: AmmoCounter

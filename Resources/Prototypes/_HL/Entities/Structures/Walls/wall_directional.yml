- type: entity
  parent: BaseWallDirectional
  id: WallDirectionalWood
  name: directional wood wall
  description: Cheap and cheerful wood plating.
  components:
  # Livyathan start: # I know it's weird to give them metal impact sounds, but normal wood walls do it, too.
  - type: RangedDamageSound
    soundGroups:
      Brute:
        collection:
          MetalBulletImpact
    soundTypes:
      Heat:
        collection:
          MetalLaserImpact
  - type: MeleeSound
    soundGroups:
      Brute:
        collection: MetalThud
  # Livyathan end
  - type: Sprite
    sprite: _HL/Structures/Walls/Directional/wood.rsi
    state: directionalwallwood
  - type: Icon
    sprite: _HL/Structures/Walls/Directional/wood.rsi
    state: directionalwallwood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroyHeavy
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: WallDirectionalWood
    node: wallDirectionalWood
    deconstructionTarget: start

- type: entity
  parent: BaseWallDirectional
  id: WallDirectionalCardboard
  name: directional cardboard wall
  description: Budget cuts are hitting hard.
  components:
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/Weapons/pierce.ogg"
  - type: Sprite
    drawdepth: SmallObjects
    sprite: _HL/Structures/Walls/Directional/cardboard.rsi
    state: directionalwallcardboard
  - type: Icon
    sprite: _HL/Structures/Walls/Directional/cardboard.rsi
    state: directionalwallcardboard
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Card
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,-0.28125"
        mask:
        - FullTileMask
        layer:
        - FlimsyLayer
        density: 250
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 40
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: WallDirectionalCardboard
    node: wallDirectionalCardboard
    deconstructionTarget: start


- type: entity
  parent: [ BaseMobSpecies, MobBloodstream, MobAtmosExposed, MobFlammable ]
  id: BaseMobSynth
  name: Urist McSynth
  save: false
  abstract: true
  components:
  - type: Sprite
  - type: Icon # It will not have an icon in the adminspawn menu without this. Body parts seem fine for whatever reason.
    sprite: _HL/Mobs/Species/Synth/parts.rsi
    state: full
  - type: Damageable
    damageModifierSet: Synth
    damageContainer: Synth
  - type: HLSynth
  - type: Thirst
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#3f1b66cc"
  - type: ZombieImmune
  - type: Sanitized
  - type: Uncloneable
  - type: Puller
    needsHands: false
  - type: HumanoidAppearance
    species: Synth
  - type: Body
    prototype: Synth
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcFist
    damage:
      types:
        Blunt: 8 # Synths hit hard.
  - type: Inventory
    speciesId: synth
    displacements:
      head:
        sizeMaps:
          32:
            sprite: _HL/Mobs/Species/Synth/displacement.rsi
            state: head
      mask:
        sizeMaps:
          32:
            sprite: _HL/Mobs/Species/Synth/displacement.rsi
            state: mask
      back:
        sizeMaps:
          32:
            sprite: _HL/Mobs/Species/Synth/displacement.rsi
            state: back
      outerClothing:
        sizeMaps:
          32:
            sprite: _HL/Mobs/Species/Synth/displacement.rsi
            state: outerclothing
      jumpsuit:
        sizeMaps:
          32:
            sprite: _HL/Mobs/Species/Synth/displacement.rsi
            state: jumpsuit
      hand:
        sizeMaps:
          32:
            sprite: _HL/Mobs/Species/Synth/displacement.rsi
            state: hand
      shoes:
        sizeMaps:
          32:
            sprite: _HL/Mobs/Species/Synth/displacement.rsi
            state: shoes
  - type: Carriable
  - type: TypingIndicator
    proto: robot
  - type: Speech
    speechVerb: Robotic
    speechSounds: Borg
    allowedEmotes: [ 'Thump', 'Purr', 'Beep', 'Ping', 'Buzz' ]
  - type: Vocal
    sounds:
      Male: UnisexSilicon
      Female: UnisexSilicon
      Unsexed: UnisexSilicon
  - type: BodyEmotes
    soundsId: ReptilianBodyEmotes
  - type: WiresPanel
    openingTool: Operating
  - type: ContainerContainer
    containers:
      key_slots: !type:Container
  - type: EncryptionKeyHolder
    keySlots: 10
    examineWhileLocked: false
    preserveExistingChannels: true
    intrinsicChannels:
    - Trinary
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    intrinsicChannels:
    - Trinary
  - type: ActiveRadio
    intrinsicChannels:
    - Trinary
  - type: Bloodstream
    bloodReagent: SynthBlood
    bloodMaxVolume: 270
    bloodRefreshAmount: 0.0
  - type: BlockInjection
    blockHypospray: true
    blockInjectOnProjectile: true
    blockReason: synth
  - type: Temperature
    heatDamageThreshold: 475
    coldDamageThreshold: 55
    coldDamage:
      types:
        Cold: 0.1 # per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 1.5 # per second, scales with temperature & other constants
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.3 # per second, scales with pressure and other constants.
  - type: TemperatureSpeed
    thresholds:
      100: 0.7
      75: 0.4
      55: 0.2
  - type: LayingDown
  - type: OfferItem

- type: entity
  parent: BaseSpeciesDummy
  id: MobSynthDummy
  name: Synth Dummy
  categories: [ HideSpawnMenu ]
  components:
  - type: Inventory
    speciesId: synth
    displacements:
      head:
        sizeMaps:
          32:
            sprite: _HL/Mobs/Species/Synth/displacement.rsi
            state: head
      mask:
        sizeMaps:
          32:
            sprite: _HL/Mobs/Species/Synth/displacement.rsi
            state: mask
      back:
        sizeMaps:
          32:
            sprite: _HL/Mobs/Species/Synth/displacement.rsi
            state: back
      outerClothing:
        sizeMaps:
          32:
            sprite: _HL/Mobs/Species/Synth/displacement.rsi
            state: outerclothing
      jumpsuit:
        sizeMaps:
          32:
            sprite: _HL/Mobs/Species/Synth/displacement.rsi
            state: jumpsuit
      hand:
        sizeMaps:
          32:
            sprite: _HL/Mobs/Species/Synth/displacement.rsi
            state: hand
      shoes:
        sizeMaps:
          32:
            sprite: _HL/Mobs/Species/Synth/displacement.rsi
            state: shoes

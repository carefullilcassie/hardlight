#Empty boxes
#Small: 9x19, 46x30, 45acp, 57x28. Medium: 556x45, 635x40, 762x39, 762x51. Large: 762x54, 45 magnum, 8x65, 145x114. Shotgun: 12 gauge, 4 gauge
- type: entity
  parent: BaseItem
  id: AmmoBoxSmallEmpty
  name: small ammunition box
  description: Small cardboard box, capable of holding basic pistol cartridges.
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - Cartridge45_ACPFMJ
        - Cartridge57x28mmFMJ
        - Cartridge9x19mm
        - Cartridge46x30mmFMJ
    proto: null
    capacity: 90
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/Ammunition/Boxes/45_ACP.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: empty
  - type: MagazineVisuals
    magState: mag
    steps: 3
    zeroVisible: false
  - type: Appearance
    

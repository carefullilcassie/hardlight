- type: constructionGraph
  id: WallDirectionalWood
  start: start
  graph:
    - node: start
      edges:
        - to: wallDirectionalWood
          steps:
            - material: WoodPlank
              amount: 2
              doAfter: 2
    - node: wallDirectionalWood
      entity: WallDirectionalWood
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 2
            - !type:DeleteEntity {}
          steps:
            - tool: Prying
              doAfter: 2


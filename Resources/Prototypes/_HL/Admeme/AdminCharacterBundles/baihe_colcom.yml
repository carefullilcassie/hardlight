- type: entity
  parent: [BaseMobKitsune, BaseMobHuman]
  id: MobKitsunegami
  name: "Guān Bǎihé"
  components:
  - type: PotentialPsionic #HL -Irkalla Edit- Makes Kitsunes Psyker-Capable
  - type: Fixtures
    fixtures: # Taken from BaseMobSpecies to bypass parentage.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 185
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: HumanoidAppearance
    species: Kitsune
    initial: BaiheProfile
  - type: InteractionPopup
    successChance: 0.75
    interactSuccessString: petting-success-soft-floofy-kitsune
    interactFailureString: petting-failure-generic
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Floof/Voice/Vulpkanin/yap.ogg # She noisy.
  - type: Kitsune
  - type: PsionicBonusChance
    flatBonus: 1
  - type: JumpAbility
    action: ActionVulpkaninGravityJump
    canCollide: false
    jumpDistance: 15
    jumpSound:
      path: /Audio/Weapons/punchmiss.ogg
      params:
        pitch: 1.33
        volume: -5
        variation: 0.05

